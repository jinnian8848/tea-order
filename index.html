<style>
:root {
  --bg: #FFF8F0;
  --card: #FFFFFF;
  --text: #2D1810;
  --sub: #8B6F64;
  --accent: #E8784A;
  --accent2: #4A90A4;
  --border: #F0E0D6;
  --tag-bg: #FFF0E8;
  --shadow: 0 2px 12px rgba(0,0,0,.06);
  --radius: 14px;
}
* { box-sizing:border-box; margin:0; padding:0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif; background: var(--bg); color: var(--text); min-height:100vh; }
/* Header */
.header { background: #fff; border-bottom:1px solid var(--border); position:sticky; top:0; z-index:100; backdrop-filter:blur(10px); }
.header-inner { max-width:1200px; margin:0 auto; padding:12px 20px; display:flex; align-items:center; justify-content:space-between; }
.logo { font-size:22px; font-weight:800; }
.logo span { color:var(--accent); }
.cart-btn { background:var(--accent); color:#fff; border:none; padding:10px 20px; border-radius:24px; font-size:15px; cursor:pointer; font-weight:600; position:relative; transition:.2s; }
.cart-btn:hover { background:#d4663a; }
.cart-count { position:absolute; top:-6px; right:-6px; background:#c0392b; color:#fff; font-size:11px; min-width:20px; height:20px; border-radius:10px; display:flex; align-items:center; justify-content:center; }
/* Brand Tabs */
.brand-nav { background:#fff; border-bottom:1px solid var(--border); position:sticky; top:61px; z-index:99; overflow-x:auto; white-space:nowrap; -webkit-overflow-scrolling:touch; }
.brand-nav-inner { max-width:1200px; margin:0 auto; padding:0 20px; display:flex; gap:4px; }
.brand-tab { padding:12px 18px; border:none; background:none; font-size:14px; cursor:pointer; border-bottom:3px solid transparent; transition:.2s; color:var(--sub); font-weight:500; white-space:nowrap; }
.brand-tab.active { color:var(--accent); border-bottom-color:var(--accent); font-weight:700; }
.brand-tab:hover { color:var(--accent); }
/* Main */
.main { max-width:1200px; margin:0 auto; padding:20px; display:flex; gap:24px; }
.menu-area { flex:1; min-width:0; }
.brand-section { display:none; }
.brand-section.active { display:block; }
.brand-title { font-size:24px; font-weight:800; margin-bottom:4px; }
.brand-desc { color:var(--sub); margin-bottom:20px; font-size:14px; }
/* Category */
.cat-title { font-size:17px; font-weight:700; margin:24px 0 12px; padding-bottom:8px; border-bottom:2px solid var(--accent); display:inline-block; }
/* Item Grid */
.item-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(280px,1fr)); gap:14px; }
.item-card { background:var(--card); border-radius:var(--radius); padding:16px; box-shadow:var(--shadow); display:flex; gap:12px; align-items:center; transition:.2s; cursor:pointer; }
.item-card:hover { box-shadow:0 4px 20px rgba(0,0,0,.1); transform:translateY(-2px); }
.item-emoji { font-size:36px; flex-shrink:0; width:52px; text-align:center; }
.item-info { flex:1; min-width:0; }
.item-name { font-weight:700; font-size:15px; margin-bottom:2px; }
.item-desc { font-size:12px; color:var(--sub); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.item-price-row { display:flex; align-items:center; justify-content:space-between; margin-top:8px; }
.item-price { font-size:18px; font-weight:800; color:var(--accent); }
.item-price .yen { font-size:13px; }
.item-add { background:var(--accent); color:#fff; border:none; width:32px; height:32px; border-radius:50%; font-size:20px; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:.2s; flex-shrink:0; line-height:1; }
.item-add:hover { background:#d4663a; transform:scale(1.1); }
.item-hot { display:inline-block; background:#FFE0D0; color:#E8784A; font-size:11px; padding:2px 8px; border-radius:10px; margin-left:6px; font-weight:600; }
/* Cart Sidebar */
.cart-bg { position:fixed; inset:0; background:rgba(0,0,0,.35); z-index:200; display:none; }
.cart-bg.open { display:block; }
.cart-sidebar { position:fixed; right:0; top:0; bottom:0; width:400px; max-width:100vw; background:#fff; z-index:201; box-shadow:-4px 0 24px rgba(0,0,0,.12); display:flex; flex-direction:column; transform:translateX(100%); transition:.3s; }
.cart-sidebar.open { transform:translateX(0); }
.cart-head { padding:20px; border-bottom:1px solid var(--border); display:flex; justify-content:space-between; align-items:center; }
.cart-head h3 { font-size:18px; }
.cart-close { background:none; border:none; font-size:24px; cursor:pointer; color:var(--sub); }
.cart-items { flex:1; overflow-y:auto; padding:16px; }
.cart-empty { text-align:center; padding:60px 20px; color:var(--sub); }
.cart-item { display:flex; align-items:center; gap:12px; padding:12px 0; border-bottom:1px solid var(--border); }
.cart-item-name { flex:1; font-weight:600; font-size:14px; }
.cart-item-brand { font-size:11px; color:var(--sub); }
.cart-qty { display:flex; align-items:center; gap:6px; }
.cart-qty button { width:26px; height:26px; border-radius:50%; border:1px solid var(--border); background:#fff; cursor:pointer; font-size:16px; line-height:1; }
.cart-qty span { min-width:24px; text-align:center; font-weight:600; }
.cart-item-price { font-weight:700; color:var(--accent); min-width:60px; text-align:right; }
.cart-item-del { background:none; border:none; color:#ccc; cursor:pointer; font-size:16px; }
.cart-foot { padding:16px 20px; border-top:1px solid var(--border); }
.cart-total { display:flex; justify-content:space-between; font-size:18px; font-weight:800; margin-bottom:12px; }
.cart-checkout { width:100%; padding:14px; background:var(--accent); color:#fff; border:none; border-radius:var(--radius); font-size:16px; font-weight:700; cursor:pointer; transition:.2s; }
.cart-checkout:hover { background:#d4663a; }
/* Modal */
.modal-bg { position:fixed; inset:0; background:rgba(0,0,0,.4); z-index:300; display:none; align-items:center; justify-content:center; }
.modal-bg.open { display:flex; }
.modal { background:#fff; border-radius:var(--radius); padding:30px; max-width:460px; width:90%; max-height:85vh; overflow-y:auto; }
.modal h2 { margin-bottom:6px; }
.modal p.dim { color:var(--sub); font-size:13px; margin-bottom:20px; }
.modal label { display:block; font-weight:600; margin:12px 0 4px; font-size:14px; }
.modal input, .modal textarea { width:100%; padding:10px 14px; border:1px solid var(--border); border-radius:10px; font-size:14px; font-family:inherit; }
.modal textarea { height:80px; resize:vertical; }
.modal .order-summary { background:var(--bg); border-radius:12px; padding:14px; margin:16px 0; font-size:13px; max-height:150px; overflow-y:auto; }
.modal .order-summary .line { display:flex; justify-content:space-between; padding:3px 0; }
.modal .order-summary .total-line { font-weight:800; border-top:1px solid var(--border); margin-top:6px; padding-top:6px; font-size:15px; }
.modal .btn-row { display:flex; gap:10px; margin-top:20px; }
.btn-submit { flex:1; padding:14px; background:var(--accent); color:#fff; border:none; border-radius:12px; font-size:16px; font-weight:700; cursor:pointer; }
.btn-submit:disabled { opacity:.5; cursor:not-allowed; }
.btn-cancel { flex:1; padding:14px; background:#f0f0f0; color:#666; border:none; border-radius:12px; font-size:16px; cursor:pointer; }
.toast { position:fixed; top:20px; left:50%; transform:translateX(-50%); padding:14px 28px; border-radius:30px; font-weight:600; z-index:999; animation:slideDown .3s; }
.toast.success { background:#4CAF50; color:#fff; }
.toast.error { background:#F44336; color:#fff; }
@keyframes slideDown { from{opacity:0;transform:translateX(-50%) translateY(-20px)} to{opacity:1;transform:translateX(-50%) translateY(0)} }
@media (max-width:768px) {
  .main { flex-direction:column; }
  .cart-sidebar { width:100%; }
  .item-grid { grid-template-columns:1fr; }
}
</style>
</head>

<div class="header">
  <div class="header-inner">
    <div class="logo">🐑 小羊<span>·专属点餐</span></div>
    <button class="cart-btn" onclick="toggleCart()">🛒 购物车 <span class="cart-count" id="cartCount" style="display:none">0</span></button>
  </div>
</div>

<nav class="brand-nav" id="brandNav">
  <div class="brand-nav-inner"></div>
</nav>

<div class="main">
  <div class="menu-area" id="menuArea"></div>

<!-- Cart Overlay -->

<div class="cart-sidebar" id="cartSidebar">

    <button class="cart-close" onclick="toggleCart()">✕</button>
  </div>
  <div class="cart-items" id="cartItems"><div class="cart-empty">购物车是空的，快去点单吧~</div></div>
  <div class="cart-foot">
    <div class="cart-total"><span>合计</span><span id="cartTotal">¥0</span></div>
    <button class="cart-checkout" onclick="openCheckout()">去结算</button>
  </div>
</div>

<!-- Checkout Modal -->
<div class="modal-bg" id="checkoutModal">
  <div class="modal">
    <h2>📋 确认订单</h2>
    <p class="dim">请填写信息，订单将发送到商家邮箱</p>
    <label>👤 姓名</label>
    <input type="text" id="customerName" placeholder="请输入您的姓名">
    <label>📱 电话</label>
    <input type="tel" id="customerPhone" placeholder="请输入手机号">
    <label>📝 备注</label>
    <textarea id="customerNote" placeholder="甜度、冰量等特殊要求..."></textarea>
    <div class="order-summary" id="orderSummary"></div>
    <div class="btn-row">
      <button class="btn-cancel" onclick="closeCheckout()">再想想</button>
      <button class="btn-submit" id="submitBtn" onclick="submitOrder()">📧 提交订单</button>
    </div>
  </div>
</div>

<div id="toastContainer"></div>

// ============ STATE ============
let cart = [];

// ============ RENDER ============
const brandNav = document.getElementById('brandNav').querySelector('.brand-nav-inner');
const menuArea = document.getElementById('menuArea');

BRANDS.forEach((brand, idx) => {
  const tab = document.createElement('button');
  tab.className = 'brand-tab' + (idx === 0 ? ' active' : '');
  tab.textContent = brand.emoji + ' ' + brand.name;
  tab.onclick = () => switchBrand(idx);
  brandNav.appendChild(tab);

  const section = document.createElement('div');
  section.className = 'brand-section' + (idx === 0 ? ' active' : '');
  section.id = 'brand-' + brand.id;
  let html = `<div class="brand-title">${brand.emoji} ${brand.name}</div>`;
  html += `<div class="brand-desc">${brand.desc}</div>`;
  brand.categories.forEach(cat => {
    html += `<div class="cat-title">${cat.name}</div><div class="item-grid">`;
    cat.items.forEach(item => {
      html += `
        <div class="item-card" onclick="addToCart('${brand.name}', '${item.n}', ${item.p})">
          <div class="item-emoji">${item.e}</div>
          <div class="item-info">
            <div class="item-name">${item.n}${item.hot ? '<span class="item-hot">爆款</span>' : ''}</div>
            <div class="item-desc">${item.d}</div>
            <div class="item-price-row">
              <span class="item-price"><span class="yen">¥</span>${item.p}</span>
              <button class="item-add" onclick="event.stopPropagation(); addToCart('${brand.name}', '${item.n}', ${item.p})">+</button>
            </div>
          </div>
        </div>`;
    });
    html += `</div>`;
  });
  section.innerHTML = html;
  menuArea.appendChild(section);
});

function switchBrand(idx) {
  document.querySelectorAll('.brand-tab').forEach((t, i) => t.classList.toggle('active', i === idx));
  document.querySelectorAll('.brand-section').forEach((s, i) => s.classList.toggle('active', i === idx));
  document.getElementById('brand-' + BRANDS[idx].id).scrollIntoView({ behavior: 'smooth', block: 'start' });
}

// ============ CART ============
function addToCart(brand, name, price) {
  const key = brand + '|' + name;
  const existing = cart.find(c => c.key === key);
  if (existing) { existing.qty++; } else { cart.push({ key, brand, name, price, qty: 1 }); }
  updateCart();
  showToast(`已添加 ${name}`, 'success');
}

function removeFromCart(key) {
  cart = cart.filter(c => c.key !== key);
  updateCart();
}

function changeQty(key, delta) {
  const item = cart.find(c => c.key === key);
  if (!item) return;
  item.qty += delta;
  if (item.qty <= 0) { cart = cart.filter(c => c.key !== key); }
  updateCart();
}

function updateCart() {
  const count = cart.reduce((s, c) => s + c.qty, 0);
  const countEl = document.getElementById('cartCount');
  countEl.textContent = count;
  countEl.style.display = count > 0 ? 'flex' : 'none';

  const total = cart.reduce((s, c) => s + c.price * c.qty, 0);
  document.getElementById('cartTotal').textContent = '¥' + total;

  const itemsEl = document.getElementById('cartItems');
  if (cart.length === 0) {
    itemsEl.innerHTML = '<div class="cart-empty">购物车是空的，快去点单吧~</div>';
  } else {
    itemsEl.innerHTML = cart.map(c => `
      <div class="cart-item">
        <div style="flex:1;min-width:0">
          <div class="cart-item-name">${c.name}</div>
          <div class="cart-item-brand">${c.brand}</div>
        </div>
        <div class="cart-qty">
          <button onclick="changeQty('${c.key}', -1)">−</button>
          <span>${c.qty}</span>
          <button onclick="changeQty('${c.key}', 1)">+</button>
        </div>
        <div class="cart-item-price">¥${(c.price * c.qty).toFixed(0)}</div>
        <button class="cart-item-del" onclick="removeFromCart('${c.key}')">🗑</button>
      </div>
    `).join('');
  }
}

function toggleCart() {
  const open = !document.getElementById('cartSidebar').classList.contains('open');
  document.getElementById('cartSidebar').classList.toggle('open', open);
  document.getElementById('cartBg').classList.toggle('open', open);
}

// ============ CHECKOUT ============
function openCheckout() {
  if (cart.length === 0) { showToast('购物车是空的', 'error'); return; }
  document.getElementById('checkoutModal').classList.add('open');
  const summary = document.getElementById('orderSummary');
  let html = '';
  let total = 0;
  cart.forEach(c => {
    const sub = c.price * c.qty;
    total += sub;
    html += `<div class="line"><span>[${c.brand}] ${c.name} ×${c.qty}</span><span>¥${sub}</span></div>`;
  });
  html += `<div class="line total-line"><span>合计</span><span>¥${total}</span></div>`;
  summary.innerHTML = html;
  toggleCart();
}

function closeCheckout() {
  document.getElementById('checkoutModal').classList.remove('open');
}

// ============ EMAIL ============
// EmailJS v4 配置
const EMAILJS_PUBLIC_KEY = 'C1nzh5iQ-W-9xdUGX';
const EMAILJS_SERVICE_ID = 'service_6n8wpxo';
const EMAILJS_TEMPLATE_ID = 'template_fwg5ez2';

(async function initEmailJS() {
  try {
    emailjs.init(EMAILJS_PUBLIC_KEY);
    console.log('EmailJS 初始化成功');
  } catch(e) {
    console.warn('EmailJS 初始化失败，将使用备用方案:', e.message);
  }
})();

async function submitOrder() {
  const name = document.getElementById('customerName').value.trim();
  const phone = document.getElementById('customerPhone').value.trim();
  const note = document.getElementById('customerNote').value.trim();

  if (!name || !phone) { showToast('请填写姓名和电话', 'error'); return; }
  if (!/^1\d{10}$/.test(phone)) { showToast('请填写正确的手机号', 'error'); return; }

  const btn = document.getElementById('submitBtn');
  btn.disabled = true;
  btn.textContent = '📧 发送中...';

  // 构建订单明细
  let orderItems = '';
  let total = 0;
  cart.forEach(c => {
    const sub = c.price * c.qty;
    total += sub;
    orderItems += `[${c.brand}] ${c.name} ×${c.qty}  ¥${sub}\n`;
  });

  const params = {
    customer_name: name,
    customer_phone: phone,
    customer_note: note || '无',
    order_items: orderItems,
    total_price: '¥' + total,
    order_time: new Date().toLocaleString(),
  };

  try {
    const response = await emailjs.send(EMAILJS_SERVICE_ID, EMAILJS_TEMPLATE_ID, params);
    console.log('EmailJS 响应:', response.status, response.text);
    showToast('✅ 订单已发送！商家会尽快处理', 'success');
    cart = [];
    updateCart();
    closeCheckout();
    document.getElementById('customerName').value = '';
    document.getElementById('customerPhone').value = '';
    document.getElementById('customerNote').value = '';
  } catch(e) {
    console.error('EmailJS 错误详情:', e);
    console.error('错误代码:', e.code || e.status);
    console.error('错误信息:', e.message || e.text);
    // 如果emailjs ID不正确(404)，说明template/service ID需要确认
    if (e.status === 404 || (e.message && e.message.includes('404'))) {
      showToast('⚠️ 邮件服务配置有误，请检查 EmailJS 后台的 Service ID 和 Template ID', 'error');
    } else {
      showToast('⚠️ 发送失败: ' + (e.text || e.message || '请检查邮箱配置'), 'error');
    }
  }

  btn.disabled = false;
  btn.textContent = '📧 提交订单';
}

// ============ TOAST ============
function showToast(msg, type) {
  const el = document.createElement('div');
  el.className = 'toast ' + type;
  el.textContent = msg;
  document.getElementById('toastContainer').appendChild(el);
  setTimeout(() => el.remove(), 2500);
}

// ============ INIT ============
updateCart();
